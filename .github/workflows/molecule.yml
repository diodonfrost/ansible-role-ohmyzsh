name: molecule

on:
  push:
  pull_request:
  schedule:
    - cron: '0 18 * * sun'

jobs:
  build:
    name: ${{ matrix.image }} ohmyzsh ${{ matrix.ohmyzsh_theme }} ${{ matrix.ohmyzsh_plugins }}
    runs-on: ubuntu-latest
    env:
      docker_namespace: ghcr.io/diodonfrost
    strategy:
      fail-fast: false
      matrix:
        image:
          - almalinux:10
          - rockylinux:9
          - oraclelinux:10
          - amazonlinux:2023
          - fedora:43
          - debian:13
          - debian:12
          - ubuntu:26.04
          - ubuntu:24.04
          - opensuse:16.0
          - archlinux:latest
          - alpine:latest
        ohmyzsh_theme:
          - intheloop
          - jispwoso
        ohmyzsh_plugins:
          - "git,docker,systemd"
          - "rails,git,ruby"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python 3.13
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Install Molecule
        run: |
          python -m pip install --upgrade pip
          pip install ansible ansible-lint molecule-docker docker

      - name: Test Ansible role
        run: molecule test
        env:
          namespace: ${{ env.docker_namespace }}
          image: ansible-${{ matrix.image }}
          ohmyzsh_theme: ${{ matrix.ohmyzsh_theme }}
          ohmyzsh_plugins: ${{ matrix.ohmyzsh_plugins }}

      - name: Test Ansible role with check_mode enable
        run: molecule check
        env:
          image: ansible-${{ matrix.image }}
          ohmyzsh_theme: ${{ matrix.ohmyzsh_theme }}
          ohmyzsh_plugins: ${{ matrix.ohmyzsh_plugins }}
